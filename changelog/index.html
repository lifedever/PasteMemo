<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page.title">Changelog — PasteMemo</title>
  <link rel="icon" type="image/svg+xml" href="../logo-2.svg">
  <style>
    :root {
      --orange-50: #FFF7ED;
      --orange-100: #FFEDD5;
      --orange-400: #FB923C;
      --orange-500: #F97316;
      --orange-600: #EA580C;
      --bg: #FFFFFF;
      --bg-alt: #F9FAFB;
      --bg-subtle: #FAFAFA;
      --card-bg: #FFFFFF;
      --border: #F3F4F6;
      --border-strong: #E5E7EB;
      --rule: rgba(17, 24, 39, 0.06);
      --text: #1F2937;
      --text-heading: #111827;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --code-bg: #F3F4F6;
      --btn-secondary-bg: #F3F4F6;
      --glow: rgba(249, 115, 22, 0.18);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --orange-50: rgba(249, 115, 22, 0.1);
        --bg: #0F0F0F;
        --bg-alt: #1A1A1A;
        --bg-subtle: #141414;
        --card-bg: #1E1E1E;
        --border: #2A2A2A;
        --border-strong: #3A3A3A;
        --rule: rgba(255, 255, 255, 0.06);
        --text: #E5E5E5;
        --text-heading: #F5F5F5;
        --text-secondary: #A3A3A3;
        --text-muted: #737373;
        --code-bg: #262626;
        --btn-secondary-bg: #262626;
        --glow: rgba(249, 115, 22, 0.25);
      }
    }
    html.theme-dark {
      --orange-50: rgba(249, 115, 22, 0.1);
      --bg: #0F0F0F; --bg-alt: #1A1A1A; --bg-subtle: #141414; --card-bg: #1E1E1E;
      --border: #2A2A2A; --border-strong: #3A3A3A; --rule: rgba(255,255,255,0.06);
      --text: #E5E5E5; --text-heading: #F5F5F5; --text-secondary: #A3A3A3; --text-muted: #737373;
      --code-bg: #262626; --btn-secondary-bg: #262626; --glow: rgba(249,115,22,0.25);
    }
    html.theme-light {
      --orange-50: #FFF7ED;
      --bg: #FFFFFF; --bg-alt: #F9FAFB; --bg-subtle: #FAFAFA; --card-bg: #FFFFFF;
      --border: #F3F4F6; --border-strong: #E5E7EB; --rule: rgba(17,24,39,0.06);
      --text: #1F2937; --text-heading: #111827; --text-secondary: #6B7280; --text-muted: #9CA3AF;
      --code-bg: #F3F4F6; --btn-secondary-bg: #F3F4F6; --glow: rgba(249,115,22,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased;
      line-height: 1.65;
    }

    /* Header (mirror main site) */
    header.site-header {
      position: sticky; top: 0; z-index: 200;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid var(--rule);
    }
    .site-header-inner {
      padding: 18px 40px; display: flex; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto;
    }
    .logo-group { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-group img { width: 36px; height: 36px; border-radius: 8px; }
    .logo-group span { font-size: 20px; font-weight: 600; letter-spacing: -0.2px; color: var(--text-heading); }

    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 14.5px;
      transition: color 0.2s; position: relative;
    }
    .nav-links a:hover { color: var(--text-heading); }
    .nav-links a.active { color: var(--text-heading); font-weight: 500; }
    .nav-links a.active::after {
      content: ""; position: absolute; left: 50%; bottom: -10px;
      transform: translateX(-50%); width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      box-shadow: 0 0 12px var(--glow);
    }

    .nav-controls { display: flex; gap: 8px; align-items: center; margin-left: 8px; }
    .theme-toggle {
      background: var(--btn-secondary-bg); border: 1px solid var(--border-strong); border-radius: 10px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; transition: all 0.2s; color: var(--text-secondary);
    }
    .theme-toggle:hover { color: var(--text-heading); border-color: var(--text-muted); }
    .lang-dropdown { position: relative; }
    .lang-btn {
      background: var(--btn-secondary-bg); border: 1px solid var(--border-strong); border-radius: 10px;
      padding: 6px 12px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
      font-family: inherit; display: flex; align-items: center; gap: 7px;
      transition: all 0.2s; white-space: nowrap; height: 36px;
    }
    .lang-btn:hover { color: var(--text-heading); border-color: var(--text-muted); }
    .lang-btn.active { border-color: var(--orange-500); color: var(--text-heading); }
    .lang-btn svg.caret { width: 10px; height: 6px; transition: transform 0.2s; }
    .lang-btn.active svg.caret { transform: rotate(180deg); }
    .lang-btn .globe { width: 14px; height: 14px; opacity: 0.7; }

    .lang-menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 6px; min-width: 170px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      opacity: 0; visibility: hidden; transform: translateY(-4px);
      transition: all 0.15s ease; z-index: 210;
      max-height: 320px; overflow-y: auto;
    }
    .lang-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
    .lang-menu-item {
      display: flex; align-items: center; padding: 8px 12px; font-size: 13px;
      color: var(--text-secondary); cursor: pointer; border-radius: 7px;
      transition: all 0.15s; white-space: nowrap;
    }
    .lang-menu-item:hover { background: var(--orange-50); color: var(--text-heading); }
    .lang-menu-item.selected { color: var(--orange-500); font-weight: 500; }
    .lang-menu-item.selected::after { content: '✓'; margin-left: auto; padding-left: 12px; font-size: 12px; }

    .menu-toggle {
      display: none; background: transparent; border: none; cursor: pointer;
      padding: 8px; width: 40px; height: 40px;
      flex-direction: column; justify-content: center; align-items: center; gap: 5px; z-index: 310;
    }
    .menu-toggle span {
      display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px;
      transition: transform 0.25s, opacity 0.2s;
    }
    .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; z-index: 290;
    }
    .nav-backdrop.show { opacity: 1; visibility: visible; }
    @media (min-width: 769px) { .nav-backdrop, .nav-backdrop.show { display: none; } }

    /* Hero */
    .hero {
      position: relative; padding: 96px 24px 64px; max-width: 1200px; margin: 0 auto;
      text-align: center; overflow: hidden;
    }
    .hero::before {
      content: ""; position: absolute; left: 50%; top: -160px;
      width: 900px; height: 600px; transform: translateX(-50%);
      background: radial-gradient(closest-side, var(--glow), transparent 70%);
      pointer-events: none; filter: blur(8px); z-index: 0;
    }
    .hero > * { position: relative; z-index: 1; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 7px 14px 7px 10px; border-radius: 999px;
      background: var(--bg-alt); border: 1px solid var(--rule);
      font-size: 11.5px; font-weight: 600; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--text-secondary); margin-bottom: 28px;
    }
    .eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      box-shadow: 0 0 0 3px var(--orange-50), 0 0 10px var(--glow);
    }
    .hero h1 {
      font-size: clamp(44px, 7.2vw, 82px); font-weight: 800;
      line-height: 1.02; letter-spacing: -2.4px;
      color: var(--text-heading); margin: 0 auto 20px; max-width: 12ch;
    }
    .hero h1 .grad {
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p.sub {
      max-width: 560px; margin: 0 auto; font-size: 17px; line-height: 1.6; color: var(--text-secondary);
    }
    .hero .rule {
      display: block; margin: 42px auto 0; width: 44px; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--orange-500), transparent);
      opacity: 0.85;
    }

    /* Layout */
    .layout {
      max-width: 1200px; margin: 0 auto;
      padding: 20px 40px 120px;
      display: grid; grid-template-columns: 220px 1fr;
      gap: 80px; align-items: start;
    }
    main.stream { min-width: 0; position: relative; }
    main.stream::before {
      content: ""; position: absolute; left: 7px; top: 14px; bottom: 20px;
      width: 1px; background: linear-gradient(to bottom, var(--rule), var(--rule) 80%, transparent);
    }

    /* Sidebar */
    .sidebar {
      position: sticky; top: 96px; max-height: calc(100vh - 120px);
      overflow-y: auto; padding: 4px 4px 24px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
    .side-eyebrow {
      font-size: 10.5px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--text-muted); padding: 0 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .side-eyebrow::after { content: ""; flex: 1; height: 1px; background: var(--rule); }
    .sidebar-list { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-item {
      display: grid; grid-template-columns: 1fr auto;
      align-items: baseline; gap: 12px;
      padding: 9px 12px; border-radius: 8px; text-decoration: none;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .sidebar-item:hover { background: var(--bg-alt); color: var(--text-heading); }
    .sidebar-item.active { background: var(--orange-50); color: var(--orange-600); font-weight: 600; }
    .sidebar-item .v { font-size: 13.5px; letter-spacing: -0.1px; }
    .sidebar-item .d { font-size: 11px; color: var(--text-muted); }
    .sidebar-item.active .d { color: var(--orange-500); opacity: 0.8; }

    /* Timeline release */
    .release { position: relative; padding: 4px 0 48px 44px; scroll-margin-top: 96px; }
    .release:last-child { padding-bottom: 0; }
    .release::before {
      content: ""; position: absolute; left: 0; top: 14px;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--border-strong);
      transition: all 0.2s;
    }
    .release.is-latest::before {
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      border-color: transparent;
      box-shadow: 0 0 0 4px var(--orange-50), 0 0 16px var(--glow);
    }
    .release.is-active::before {
      background: linear-gradient(135deg, var(--orange-400), var(--orange-600));
      border-color: transparent; box-shadow: 0 0 0 4px var(--orange-50);
    }

    .release-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .release-date {
      font-size: 12.5px; color: var(--text-muted); letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .release-date::before {
      content: ""; width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-muted); opacity: 0.6;
    }
    .release-badge {
      font-size: 10.5px; font-weight: 700; color: #fff;
      padding: 3px 10px; border-radius: 999px;
      letter-spacing: 1.2px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      box-shadow: 0 2px 10px var(--glow);
    }
    .release-badge.pre {
      background: linear-gradient(135deg, #6B7280, #4B5563);
      box-shadow: 0 2px 10px rgba(107,114,128,0.25);
    }

    .release-version {
      display: inline-flex; align-items: baseline; gap: 14px;
      margin-bottom: 22px;
      font-size: 36px; font-weight: 700; letter-spacing: -1.2px;
      color: var(--text-heading); font-variant-numeric: tabular-nums;
      text-decoration: none; transition: color 0.2s;
    }
    .release-version:hover { color: var(--orange-500); }
    .release-version .ext {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      opacity: 0; transform: translateX(-4px); transition: all 0.2s;
    }
    .release-version:hover .ext { opacity: 1; transform: translateX(0); }

    .release-body { color: var(--text); font-size: 15.5px; line-height: 1.75; }
    .release-body h1, .release-body h2, .release-body h3, .release-body h4 {
      color: var(--text-heading); margin: 26px 0 10px; font-weight: 600; letter-spacing: -0.2px;
    }
    .release-body h2 { font-size: 17px; }
    .release-body h3 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 1.6px;
      color: var(--text-secondary); font-weight: 700; margin-top: 28px;
    }
    .release-body h4 { font-size: 14px; color: var(--text-secondary); }
    .release-body p { margin: 10px 0; }
    .release-body ul { list-style: none; padding-left: 0; margin: 8px 0; }
    .release-body li { position: relative; padding: 4px 0 4px 22px; margin: 2px 0; }
    .release-body li::before {
      content: ""; position: absolute; left: 4px; top: 16px;
      width: 6px; height: 1px; background: var(--text-muted); opacity: 0.55;
    }
    .release-body strong { color: var(--text-heading); font-weight: 600; }
    .release-body a {
      color: var(--orange-600); text-decoration: none;
      border-bottom: 1px solid color-mix(in srgb, var(--orange-500) 35%, transparent);
      transition: border-color 0.15s, color 0.15s;
    }
    .release-body a:hover { color: var(--orange-500); border-bottom-color: var(--orange-500); }
    .release-body code {
      background: var(--code-bg); padding: 2px 7px; border-radius: 5px; font-size: 0.88em;
      font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      color: var(--text-heading); border: 1px solid var(--rule);
    }
    .release-body table {
      border-collapse: collapse; margin: 14px 0; font-size: 14px; width: 100%;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .release-body th, .release-body td {
      padding: 9px 14px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .release-body th { background: var(--bg-alt); font-weight: 600; color: var(--text-heading); }
    .release-body tr:last-child td { border-bottom: none; }
    .release-body img { max-width: 100%; border-radius: 8px; }

    .loading, .error {
      text-align: center; padding: 80px 20px; color: var(--text-secondary); font-size: 14px;
    }
    .loading::before {
      content: ""; display: block; width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border-strong); border-top-color: var(--orange-500);
      margin: 0 auto 14px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error a { color: var(--orange-500); border-bottom: 1px solid var(--orange-500); }

    .sidebar-skeleton { padding: 0 12px; }
    .sidebar-skeleton .row {
      height: 28px; margin-bottom: 6px; border-radius: 6px;
      background: linear-gradient(90deg, var(--bg-alt), var(--border), var(--bg-alt));
      background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; gap: 0; padding: 8px 20px 80px; }
      .sidebar { display: none; }
      .hero { padding: 56px 20px 36px; }
      main.stream::before { left: 5px; }
      .release { padding-left: 32px; padding-bottom: 40px; }
      .release::before { width: 11px; height: 11px; top: 16px; }
      .release-version { font-size: 28px; }
    }
    @media (max-width: 768px) {
      .site-header-inner { padding: 14px 16px; }
      .menu-toggle { display: flex; }
      .nav-links {
        position: fixed; top: 0; right: 0; height: 100vh; width: 82%; max-width: 320px;
        background: var(--card-bg); border-left: 1px solid var(--border);
        flex-direction: column; align-items: stretch; gap: 4px;
        padding: 76px 20px 24px; transform: translateX(100%);
        transition: transform 0.25s ease; z-index: 300;
        overflow-y: auto; box-shadow: -8px 0 30px rgba(0,0,0,0.12);
      }
      .nav-links.open { transform: translateX(0); }
      .nav-links a { font-size: 15px; padding: 12px 10px; border-radius: 8px; }
      .nav-links a:hover { background: var(--bg-alt); }
      .nav-links a.active::after { display: none; }
      .nav-links a.active { color: var(--orange-500); background: var(--orange-50); }
      .nav-controls { flex-direction: row; margin: 12px 0 0; padding-top: 16px; border-top: 1px solid var(--border); gap: 8px; }
      .lang-dropdown { flex: 1; }
      .lang-btn { width: 100%; justify-content: space-between; }
      .lang-menu { left: 0; right: 0; }
    }
    @media (max-width: 480px) {
      .hero h1 { letter-spacing: -1.4px; }
      .release-version { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="logo-group" href="../">
        <img src="../logo-2.svg" alt="PasteMemo">
        <span>PasteMemo</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="../#features" data-i18n="nav.features">Features</a>
        <a href="../#download" data-i18n="nav.download">Download</a>
        <a href="https://www.lifedever.com" data-i18n="nav.sponsor">Sponsor</a>
        <a href="https://github.com/lifedever/PasteMemo-app/issues" data-i18n="nav.feedback">Feedback</a>
        <a href="../help/" data-i18n="nav.help">Help</a>
        <a href="./" class="active" data-i18n="nav.changelog">Changelog</a>
        <a href="https://github.com/lifedever/PasteMemo-app" data-i18n="nav.github" target="_blank" rel="noopener">GitHub</a>
        <div class="nav-controls">
          <div class="lang-dropdown" id="langDropdown">
            <button class="lang-btn" id="langBtn" type="button">
              <svg class="globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              <span id="langLabel">English</span>
              <svg class="caret" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="lang-menu" id="langMenu">
              <div class="lang-menu-item" data-lang="zh-Hans">简体中文</div>
              <div class="lang-menu-item" data-lang="zh-Hant">繁體中文</div>
              <div class="lang-menu-item" data-lang="en">English</div>
              <div class="lang-menu-item" data-lang="ja">日本語</div>
              <div class="lang-menu-item" data-lang="ko">한국어</div>
              <div class="lang-menu-item" data-lang="fr">Français</div>
              <div class="lang-menu-item" data-lang="de">Deutsch</div>
              <div class="lang-menu-item" data-lang="es">Español</div>
              <div class="lang-menu-item" data-lang="it">Italiano</div>
              <div class="lang-menu-item" data-lang="ru">Русский</div>
              <div class="lang-menu-item" data-lang="id">Bahasa Indonesia</div>
            </div>
          </div>
          <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
        </div>
      </nav>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-backdrop" id="navBackdrop"></div>
    </div>
  </header>

  <section class="hero">
    <h1 data-i18n-html="title">Change<span class="grad">log</span></h1>
    <p class="sub" data-i18n="subtitle">Every release of PasteMemo, pulled live from GitHub.</p>
    <span class="rule"></span>
  </section>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Versions">
      <div class="side-eyebrow" data-i18n="sideLabel">Versions</div>
      <div class="sidebar-skeleton" id="sidebarSkel">
        <div class="row"></div><div class="row"></div><div class="row"></div>
        <div class="row"></div><div class="row"></div>
      </div>
    </aside>
    <main class="stream">
      <div id="list" class="loading" data-i18n="loading">Loading…</div>
    </main>
  </div>

  <script>
    const REPO = "lifedever/PasteMemo-app";

    const i18n = {

    function detectLang() {
      const stored = localStorage.getItem("lang");
      if (stored && i18n[stored]) return stored;
      const b = (navigator.language || "en").toLowerCase();
      if (b.startsWith("zh")) return b.includes("tw") || b.includes("hk") ? "zh-Hant" : "zh-Hans";
      const short = b.split("-")[0];
      return i18n[short] ? short : "en";
    }

    let currentLang = detectLang();
    let t = i18n[currentLang] || i18n.en;

    function setFragment(el, html) {
      const range = document.createRange();
      range.selectNodeContents(el);
      range.deleteContents();
      el.appendChild(range.createContextualFragment(html));
    }

    function applyLanguage(lang) {
      currentLang = lang;
      t = i18n[lang] || i18n.en;
      document.documentElement.lang = lang;
      document.title = t["page.title"];
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (t[k] != null) el.textContent = t[k];
      });
      document.querySelectorAll("[data-i18n-html]").forEach(el => {
        const k = el.getAttribute("data-i18n-html");
        if (t[k] != null) setFragment(el, t[k]);
      });
      const sideEyebrow = document.querySelector(".side-eyebrow");
      if (sideEyebrow) sideEyebrow.textContent = t.sideLabel;
    }

    const langBtn = document.getElementById("langBtn");
    const langLabel = document.getElementById("langLabel");
    const langMenu = document.getElementById("langMenu");
    const langItems = langMenu.querySelectorAll(".lang-menu-item");

    function updateLangUI(lang) {
      langItems.forEach(item => {
        item.classList.toggle("selected", item.dataset.lang === lang);
        if (item.dataset.lang === lang) langLabel.textContent = item.textContent;
      });
    }
    updateLangUI(currentLang);
    applyLanguage(currentLang);

    langBtn.addEventListener("click", e => {
      e.stopPropagation();
      langMenu.classList.toggle("show");
      langBtn.classList.toggle("active");
    });
    document.addEventListener("click", () => {
      langMenu.classList.remove("show");
      langBtn.classList.remove("active");
    });
    langItems.forEach(item => {
      item.addEventListener("click", () => {
        const lang = item.dataset.lang;
        localStorage.setItem("lang", lang);
        updateLangUI(lang);
        applyLanguage(lang);
        langMenu.classList.remove("show");
        langBtn.classList.remove("active");
        if (window.__releasesCache) renderAll(window.__releasesCache);
      });
    });

    const themeToggle = document.getElementById("themeToggle");
    const sunIcon = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
    const moonIcon = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    function applyTheme(mode) {
      document.documentElement.classList.remove("theme-dark", "theme-light");
      if (mode === "dark") document.documentElement.classList.add("theme-dark");
      else if (mode === "light") document.documentElement.classList.add("theme-light");
      const effectiveDark = mode === "dark" || (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
      setFragment(themeToggle, effectiveDark ? sunIcon : moonIcon);
    }
    const storedTheme = localStorage.getItem("theme") || "auto";
    applyTheme(storedTheme);
    themeToggle.addEventListener("click", () => {
      const isDark = document.documentElement.classList.contains("theme-dark") ||
        (!document.documentElement.classList.contains("theme-light") && matchMedia("(prefers-color-scheme: dark)").matches);
      const next = isDark ? "light" : "dark";
      localStorage.setItem("theme", next);
      applyTheme(next);
    });

    const menuToggle = document.getElementById("menuToggle");
    const navLinks = document.getElementById("navLinks");
    const navBackdrop = document.getElementById("navBackdrop");
    function setMenuOpen(open) {
      menuToggle.classList.toggle("open", open);
      navLinks.classList.toggle("open", open);
      navBackdrop.classList.toggle("show", open);
      menuToggle.setAttribute("aria-expanded", open ? "true" : "false");
      document.body.style.overflow = open ? "hidden" : "";
    }
    menuToggle.addEventListener("click", () => setMenuOpen(!navLinks.classList.contains("open")));
    navBackdrop.addEventListener("click", () => setMenuOpen(false));
    navLinks.querySelectorAll("a").forEach(a => a.addEventListener("click", () => setMenuOpen(false)));
    window.addEventListener("resize", () => {
      if (window.innerWidth > 768 && navLinks.classList.contains("open")) setMenuOpen(false);
    });

    function escapeHTML(s) {
      return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }
    function renderMarkdown(src) {
      const lines = src.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inList = false, inTable = false, tableHead = null;
      const flushList = () => { if (inList) { out.push("</ul>"); inList = false; } };
      const flushTable = () => { if (inTable) { out.push("</tbody></table>"); inTable = false; tableHead = null; } };
      const inline = text => {
        let s = escapeHTML(text);
        s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m, alt, url) => `<img src="${url}" alt="${alt}">`);
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url) => `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`);
        s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/__([^_]+)__/g, "<strong>$1</strong>");
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
        s = s.replace(/(^|[\s(])((?:https?:\/\/)[^\s<)]+)/g, (m, pre, url) => `${pre}<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
        s = s.replace(/(^|[\s(>])@([A-Za-z0-9][A-Za-z0-9-]{0,38})\b/g,
          (m, pre, user) => `${pre}<a href="https://github.com/${user}" target="_blank" rel="noopener">@${user}</a>`);
        s = s.replace(/(^|[\s(>])#(\d+)\b/g,
          (m, pre, num) => `${pre}<a href="https://github.com/${REPO}/issues/${num}" target="_blank" rel="noopener">#${num}</a>`);
        return s;
      };
      for (let raw of lines) {
        const line = raw.replace(/\s+$/, "");
        if (!line.trim()) { flushList(); flushTable(); continue; }
        if (/^\|.*\|$/.test(line.trim())) {
          if (!inTable && !tableHead) { tableHead = line; continue; }
          if (inTable) {
            const cells = line.trim().slice(1, -1).split("|").map(c => inline(c.trim()));
            out.push("<tr>" + cells.map(c => `<td>${c}</td>`).join("") + "</tr>");
            continue;
          }
        }
        if (tableHead && /^\|?[\s:|-]+\|?$/.test(line.trim())) {
          flushList();
          const headers = tableHead.trim().slice(1, -1).split("|").map(c => inline(c.trim()));
          out.push("<table><thead><tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr></thead><tbody>");
          inTable = true; tableHead = null;
          continue;
        }
        if (tableHead) { flushList(); out.push(`<p>${inline(tableHead)}</p>`); tableHead = null; }
        if (inTable && !/^\|.*\|$/.test(line.trim())) flushTable();
        let m;
        if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
          flushList();
          const lvl = Math.min(m[1].length + 1, 6);
          out.push(`<h${lvl}>${inline(m[2])}</h${lvl}>`);
        } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
          if (!inList) { out.push("<ul>"); inList = true; }
          out.push(`<li>${inline(m[1])}</li>`);
        } else {
          flushList();
          out.push(`<p>${inline(line)}</p>`);
        }
      }
      flushList(); flushTable();
      return out.join("\n");
    }

    function formatDate(iso) {
      try {
        const locale = currentLang === "zh-Hans" ? "zh-CN"
          : currentLang === "zh-Hant" ? "zh-TW"
          : currentLang;
        return new Date(iso).toLocaleDateString(locale, { year:"numeric", month:"short", day:"numeric" });
      } catch { return iso.slice(0, 10); }
    }
    function shortDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return "";
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function renderAll(releases) {
      const listEl = document.getElementById("list");
      if (!releases.length) {
        listEl.className = "loading";
        listEl.textContent = t.empty;
        return;
      }
      listEl.className = "";
      const html = releases.map((r, idx) => {
        const versionRaw = r.tag_name || r.name || "—";
        const version = escapeHTML(versionRaw);
        const slug = versionRaw.replace(/[^\w.-]/g, "-");
        const date = r.published_at || r.created_at;
        const rawBody = (r.body || "").split(/^#{2,3}\s+Download\s*$/mi)[0].trimEnd();
        const body = rawBody ? renderMarkdown(rawBody) : `<p style="color:var(--text-muted)">—</p>`;
        const badges = [];
        const isLatest = idx === 0 && !r.prerelease;
        if (isLatest) badges.push(`<span class="release-badge">${escapeHTML(t.latest)}</span>`);
        if (r.prerelease) badges.push(`<span class="release-badge pre">pre</span>`);
        return `<article class="release${isLatest ? ' is-latest' : ''}" id="${slug}" data-slug="${slug}">
          <div class="release-meta">
            <time class="release-date" datetime="${date}">${formatDate(date)}</time>
            ${badges.join("")}
          </div>
          <a class="release-version" href="${r.html_url}" target="_blank" rel="noopener">
            <span>${version}</span>
            <span class="ext">↗</span>
          </a>
          <div class="release-body">${body}</div>
        </article>`;
      }).join("");
      setFragment(listEl, html);

      const sidebar = document.getElementById("sidebar");
      const sideHtml = `<div class="side-eyebrow">${escapeHTML(t.sideLabel)}</div><nav class="sidebar-list">` +
        releases.map(r => {
          const versionRaw = r.tag_name || r.name || "—";
          const slug = versionRaw.replace(/[^\w.-]/g, "-");
          return `<a class="sidebar-item" href="#${slug}" data-slug="${slug}">
            <span class="v">${escapeHTML(versionRaw)}</span>
            <span class="d">${shortDate(r.published_at || r.created_at)}</span>
          </a>`;
        }).join("") + `</nav>`;
      setFragment(sidebar, sideHtml);

      const items = Array.from(sidebar.querySelectorAll(".sidebar-item"));
      const releaseEls = Array.from(document.querySelectorAll(".release"));
      const byId = Object.fromEntries(items.map(a => [a.dataset.slug, a]));
      const setActive = slug => {
        items.forEach(a => a.classList.toggle("active", a.dataset.slug === slug));
        releaseEls.forEach(el => el.classList.toggle("is-active", el.dataset.slug === slug));
      };
      if (items[0]) setActive(items[0].dataset.slug);
      const io = new IntersectionObserver(entries => {
        const visible = entries.filter(e => e.isIntersecting)
          .sort((a, b) => a.target.getBoundingClientRect().top - b.target.getBoundingClientRect().top)[0];
        if (visible) {
          const a = byId[visible.target.id];
          if (a) setActive(a.dataset.slug);
        }
      }, { rootMargin: "-15% 0px -70% 0px", threshold: 0 });
      releaseEls.forEach(el => io.observe(el));
    }

    async function load() {
      const listEl = document.getElementById("list");
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases?per_page=50`, {
          headers: { "Accept": "application/vnd.github+json" }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const releases = (await res.json()).filter(r => !r.draft);
        window.__releasesCache = releases;
        renderAll(releases);
      } catch (err) {
        listEl.className = "error";
        setFragment(listEl, "");
        listEl.textContent = t.errorPrefix;
        const a = document.createElement("a");
        a.href = `https://github.com/${REPO}/releases`;
        a.target = "_blank"; a.rel = "noopener";
        a.textContent = t.errorLink;
        listEl.appendChild(a);
      }
    }
    load();
  </script>
